<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo – Remotion Embed</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: hsl(215 100% 3%);
      color: #fff;
      min-height: 100vh;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr min(calc(100% - 4em), 1200px) 1fr;
      /* Texto | Animación (un poco más ancha) */
      gap: 2rem;
      min-height: 100dvh;
      overflow: hidden;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      grid-column: 2 / -2;
      grid-row: 1 / -1;
      text-align: end;
      justify-self: end;
      max-width: 50%;
      padding: clamp(1.25rem, 0.8535rem + 1.5287vw, 2rem);
      background: hsl(0 0 12% / 50%);
      align-self: center;
    }

    .hero-content h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #569cd6, #9cdcfe);
      -webkit-background-clip: text;
      background-clip: text;
      /* -webkit-text-fill-color: transparent; */
      color: transparent;
      text-wrap: balance;
    }

    .hero-content p {
      font-size: 1.25rem;
      color: #aab;
      line-height: 1.6;
      max-width: 50ch;
      text-align: end;
      justify-self: end;
      text-wrap: balance;

    }

    /* Contenedor de la animación Remotion */
    [data-remotion] {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      grid-column: 1 / -1;
      grid-row: 1 / -1;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .hero {
        /* grid-template-columns: 1fr; */
        text-align: center;
        /* padding-top: 4rem; */
        gap: 0;

        >* {
          grid-row: unset;
        }

        [data-remotion] {
          order: -1;
          grid-row: 1 / 4;
        }
      }

      .hero-content {
        grid-row: 2 / 3;
        width: min(calc(100% - 4rem), 500px);
        max-width: unset;
      }

      .hero-content p {
        margin: 0 auto;

      }
    }
  </style>
</head>

<body>
  <section class="hero">
    <div class="hero-content">
      <h1>Diseño en Plataformas Conectadas</h1>
      <p>Aprendé a crear sitios web semánticos, accesibles y profesionales con HTML5 y CSS moderno en tiempos de IA.</p>
    </div>

    <!-- La animación Remotion se monta aquí -->
    <div data-remotion></div>
  </section>

  <!-- El bundle embebible (se generará con vite build) -->
  <script src="embed-dist/remotion-embed.iife.js"></script>
</body>

</html>
